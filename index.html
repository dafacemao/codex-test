<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #eee;
  overflow: hidden;
}
h1 { margin-bottom: 12px; font-size: 28px; letter-spacing: 2px; color: #0ff; }
#info {
  display: flex;
  gap: 24px;
  margin-bottom: 10px;
  font-size: 16px;
}
#info span { color: #0ff; font-weight: bold; }
#gameCanvas {
  border: 2px solid #0ff;
  border-radius: 4px;
  background: #16213e;
}
#controls {
  margin-top: 14px;
  font-size: 13px;
  color: #888;
  text-align: center;
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  border-radius: 8px;
  padding: 30px 40px;
  z-index: 10;
}
#overlay h2 { color: #0ff; font-size: 22px; margin-bottom: 10px; }
#overlay p { color: #eee; font-size: 15px; margin-bottom: 16px; }
#overlay button {
  background: #0ff;
  color: #1a1a2e;
  border: none;
  padding: 10px 28px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 4px;
  font-weight: bold;
  transition: background 0.2s;
}
#overlay button:hover { background: #0cc; }
.hidden { display: none !important; }
</style>
</head>
<body>

<h1>贪吃蛇</h1>
<div id="info">
  <div>分数: <span id="score">0</span></div>
  <div>最高分: <span id="best">0</span></div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="controls">方向键 / WASD 控制方向 | 空格键暂停</div>

<div id="overlay">
  <h2 id="overlayTitle">贪吃蛇</h2>
  <p id="overlayMsg">按下方按钮开始游戏</p>
  <button id="overlayBtn">开始</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRID = 20;
const COLS = 30;
const ROWS = 20;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayBtn = document.getElementById('overlayBtn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

let snake, dir, nextDir, food, score, best, paused, running, speed, lastTime;

best = 0;

function init() {
  snake = [{x: 5, y: 10}, {x: 4, y: 10}, {x: 3, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  paused = false;
  speed = 120;
  lastTime = 0;
  scoreEl.textContent = score;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    speed = Math.max(60, 120 - score);
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    const ratio = i / snake.length;
    const r = Math.round(0 + ratio * 0);
    const g = Math.round(255 - ratio * 100);
    const b = Math.round(255 - ratio * 155);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.roundRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2, 4);
    ctx.fill();
  }

  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.roundRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2, 4);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', food.x * GRID + GRID / 2, food.y * GRID + GRID / 2);
}

function gameOver() {
  running = false;
  overlayTitle.textContent = '游戏结束';
  overlayMsg.textContent = `最终分数: ${score}`;
  overlayBtn.textContent = '重新开始';
  overlay.classList.remove('hidden');
}

function loop(timestamp) {
  if (!running) return;
  if (!paused) {
    if (timestamp - lastTime >= speed) {
      update();
      draw();
      lastTime = timestamp;
    }
  }
  requestAnimationFrame(loop);
}

function startGame() {
  init();
  running = true;
  overlay.classList.add('hidden');
  draw();
  requestAnimationFrame(loop);
}

overlayBtn.addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if (!running && e.key === ' ') { startGame(); return; }

  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (dir.y !== 1) nextDir = {x: 0, y: -1};
      break;
    case 'ArrowDown': case 's': case 'S':
      if (dir.y !== -1) nextDir = {x: 0, y: 1};
      break;
    case 'ArrowLeft': case 'a': case 'A':
      if (dir.x !== 1) nextDir = {x: -1, y: 0};
      break;
    case 'ArrowRight': case 'd': case 'D':
      if (dir.x !== -1) nextDir = {x: 1, y: 0};
      break;
    case ' ':
      paused = !paused;
      if (paused) {
        overlayTitle.textContent = '暂停';
        overlayMsg.textContent = '按空格键继续';
        overlayBtn.textContent = '继续';
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
      break;
  }
  e.preventDefault();
});

draw();
overlay.classList.remove('hidden');
</script>
</body>
</html>
